<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:linear-gradient(135deg,#f8fafc,#e0e7ff);min-height:100vh}
.container{max-width:1280px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb,#4f46e5);border-radius:20px;padding:28px 32px;margin-bottom:20px;color:#fff;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%)}
.header h1{font-size:26px;font-weight:700;position:relative}.header p{font-size:13px;opacity:.75;margin-top:6px;position:relative}
.rules-box{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;position:relative}
.rule-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 14px;font-size:12px;display:flex;align-items:center;gap:6px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.stat-card .label{font-size:11px;color:#6b7280;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:28px;font-weight:700;margin-top:4px}
.stat-card.danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none}
.stat-card.danger .label{color:rgba(255,255,255,.8)}
.controls{background:#fff;border-radius:16px;padding:16px;border:1px solid #e5e7eb;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.search-input{border:1.5px solid #e5e7eb;border-radius:10px;padding:9px 14px;font-size:14px;flex:1;min-width:200px;outline:none;font-family:'Sarabun',sans-serif}
.search-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.select-box{border:1.5px solid #e5e7eb;border-radius:10px;padding:9px 14px;font-size:14px;background:#fff;font-family:'Sarabun',sans-serif;cursor:pointer}
.checkbox-label{font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn{border:none;border-radius:10px;padding:9px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .2s}
.btn-violet{background:#ede9fe;color:#6d28d9}.btn-violet:hover{background:#ddd6fe}
.btn-blue{background:#dbeafe;color:#1d4ed8}.btn-blue:hover{background:#bfdbfe}
.btn-import{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;display:flex;align-items:center;gap:6px}
.btn-export{background:linear-gradient(135deg,#10b981,#059669);color:#fff;display:flex;align-items:center;gap:6px}
.table-wrap{background:#fff;border-radius:16px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:12px 10px;text-align:left;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;background:linear-gradient(to bottom,#f9fafb,#f3f4f6);border-bottom:2px solid #e5e7eb;position:sticky;top:0}
tbody td{padding:10px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
tbody tr:hover{background:#eff6ff}
tbody tr.has-ded{background:#fffbeb}tbody tr.has-ded:hover{background:#fef3c7}
tfoot td{padding:14px 10px;font-weight:700;background:linear-gradient(to bottom,#f1f5f9,#e2e8f0);border-top:2px solid #cbd5e1}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}
.badge-ok{background:#ecfdf5;color:#065f46;border-color:#a7f3d0}
.badge-late{background:#fffbeb;color:#92400e;border-color:#fde68a}
.badge-halfday{background:#fef2f2;color:#991b1b;border-color:#fecaca}
.badge-none{background:#f9fafb;color:#9ca3af;border-color:#e5e7eb}
.badge-daily{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;cursor:pointer}
.badge-perm{background:#f5f3ff;color:#6d28d9;border-color:#ddd6fe;cursor:pointer}
.tr,.tc,.tl{text-align:right}.tc{text-align:center}
.c-red{color:#dc2626}.c-amb{color:#d97706}.c-grn{color:#059669}.c-gry{color:#d1d5db}.fb{font-weight:700}
.fm{font-family:monospace;font-size:12px}
.vb{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;display:inline-flex;align-items:center}
.vb:hover{background:#dbeafe}.vb.g{color:#10b981}.vb.g:hover{background:#d1fae5}.vb.b{color:#3b82f6}
.dh{background:linear-gradient(135deg,#1e40af,#4f46e5);border-radius:20px;padding:24px 28px;color:#fff;margin-bottom:16px}
.ds{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
@media(max-width:640px){.ds{grid-template-columns:repeat(2,1fr)}}
.dsi{background:rgba(255,255,255,.13);border-radius:12px;padding:12px;text-align:center}
.dsi .v{font-size:24px;font-weight:700}.dsi .l{font-size:11px;opacity:.75}
.bb{display:inline-flex;align-items:center;gap:6px;color:#3b82f6;font-weight:600;cursor:pointer;background:none;border:none;font-family:'Sarabun',sans-serif;font-size:14px;padding:8px 0;margin-bottom:12px}
.rl{background:#fffbeb}.rh{background:#fef2f2}
.hi{display:none}
.footer{text-align:center;padding:16px;font-size:11px;color:#9ca3af}
</style>

// Export helper - plain JS, no transpilation needed
function downloadXlsx(wb, filename) {
  try {
    var X = window.XLSX;
    if (!X) { alert('XLSX ยังไม่โหลด กรุณา refresh'); return; }
    var wbout = X.write(wb, { bookType: 'xlsx', type: 'array' });
    var blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename; a.style.display = 'none';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
  } catch(e) { alert('Export ผิดพลาด: ' + e.message); }
}

    parseXlsx(f).then(d=>{setEmployees(d);const t={};d.forEach(e=>{t[e.code]='permanent'});setEmpTypes(t);setSelectedEmp(null);setImporting(false)}).catch(err=>{alert('อ่านไม่ได้: '+err.message);setImporting(false)})};
  const toggle=c=>setEmpTypes(p=>{const n={...p};n[c]=n[c]==='daily'?'permanent':'daily';return n});
  const setAll=t=>setEmpTypes(p=>{const n={...p};Object.keys(n).forEach(k=>{n[k]=t});return n});

  const summaries=useMemo(()=>employees.map(emp=>({...emp,...calcSummary(emp,empTypes[emp.code]||'permanent'),type:empTypes[emp.code]||'permanent'})),[employees,empTypes]);
  const filtered=useMemo(()=>summaries.filter(e=>{
    if(search&&!e.name.includes(search)&&!e.code.toUpperCase().includes(search.toUpperCase()))return false;
    if(filterType!=='all'&&e.type!==filterType)return false;
    if(filterLate&&e.totalDeduct===0)return false;return true}),[summaries,search,filterType,filterLate]);
  const totals=useMemo(()=>{const t={lateDeduct:0,halfDayDeduct:0,totalDeduct:0,lateCount:0,halfDayCount:0};
    filtered.forEach(e=>{t.lateDeduct+=e.lateDeduct;t.halfDayDeduct+=e.halfDayDeduct;t.totalDeduct+=e.totalDeduct;t.lateCount+=e.lateDays;t.halfDayCount+=e.halfDayCount});return t},[filtered]);

  const exportAll=()=>{try{
    const X=window.XLSX;if(!X){alert('XLSX ยังไม่โหลด');return;}
    const wb=X.utils.book_new();
    const s1=[['สรุปมาสาย - หักเงิน'],['สาย 09:01-09:30 หัก 50บ./นาที | หลัง09:30 หักครึ่งวัน'],[],['No','รหัส','ชื่อ','ประเภท','ค่าจ้าง','วันสาย','รวมนาที','หักมาสาย','ครั้งหักครึ่งวัน','หักครึ่งวัน','รวมหัก']];
    let tLD=0,tHD=0,tA=0,tDs=0,tHDs=0,tLM=0;
    filtered.forEach((emp,i)=>{const r=emp.type==='daily'?352:400;
      s1.push([i+1,emp.code,emp.name,emp.type==='daily'?'รายวัน':'ประจำ',r,emp.lateDays,emp.totalLateMin,emp.lateDeduct,emp.halfDayCount,emp.halfDayDeduct,emp.totalDeduct]);
      tDs+=emp.lateDays;tLM+=emp.totalLateMin;tLD+=emp.lateDeduct;tHDs+=emp.halfDayCount;tHD+=emp.halfDayDeduct;tA+=emp.totalDeduct});
    s1.push([],['','','รวม','','',tDs,tLM,tLD,tHDs,tHD,tA]);
    const ws1=X.utils.aoa_to_sheet(s1);ws1['!cols']=[{wch:5},{wch:8},{wch:28},{wch:9},{wch:9},{wch:10},{wch:10},{wch:12},{wch:13},{wch:13},{wch:13}];
    X.utils.book_append_sheet(wb,ws1,'สรุปยอดหัก');
    const h2=['รหัส','ชื่อ','ประเภท'];for(let d=1;d<=28;d++)h2.push(d+' ก.พ.');
    const s2=[['รายละเอียดเวลาเข้างาน'],[],h2];
    filtered.forEach(emp=>{const row=[emp.code,emp.name,emp.type==='daily'?'รายวัน':'ประจำ'];
      for(let d=1;d<=28;d++){const dd=emp.days[String(d)];
        if(!dd)row.push('-');else if(dd.lateMin===0)row.push(dd.clockIn);else if(dd.halfDay)row.push(dd.clockIn+' [หักครึ่งวัน]');else row.push(dd.clockIn+' [สาย'+dd.lateMin+'น.]');}
      s2.push(row)});
    const ws2=X.utils.aoa_to_sheet(s2);ws2['!cols']=[{wch:8},{wch:28},{wch:9}];for(let d=1;d<=28;d++)ws2['!cols'].push({wch:16});
    X.utils.book_append_sheet(wb,ws2,'รายละเอียดรายวัน');
    const s3=[['หักรายบุคคล'],[]];
    filtered.filter(e=>e.totalDeduct>0).forEach(emp=>{const r=emp.type==='daily'?352:400;
      s3.push([emp.code+' - '+emp.name+' ('+(emp.type==='daily'?'รายวัน':'ประจำ')+' '+r+' บ./วัน)']);
      s3.push(['วันที่','เวลาเข้า','สถานะ','นาทีสาย','หัก(บ.)']);
      emp.details.filter(d=>d.deduct>0).forEach(d=>{s3.push([d.day+' ก.พ.',d.clockIn,d.status==='halfday'?'หักครึ่งวัน':'สาย '+d.lateMin+' น.',d.lateMin,d.deduct])});
      s3.push(['','','','รวม',emp.totalDeduct],[])});
    const ws3=X.utils.aoa_to_sheet(s3);ws3['!cols']=[{wch:12},{wch:12},{wch:18},{wch:10},{wch:12}];
    X.utils.book_append_sheet(wb,ws3,'หักรายบุคคล');
    downloadXlsx(wb,'สรุปมาสาย_หักเงิน.xlsx');
  }catch(err){alert('Export ผิดพลาด: '+err.message)}};

  const exportPerson=code=>{try{
    const X=window.XLSX;if(!X){alert('XLSX ยังไม่โหลด');return;}
    const emp=summaries.find(e=>e.code===code);if(!emp)return;
    const r=emp.type==='daily'?352:400,tn=emp.type==='daily'?'รายวัน':'ประจำ';
    const rows=[['มาสาย - '+emp.name],['รหัส: '+emp.code+' | '+tn+' | '+r+' บ./วัน'],[],['วันที่','เวลาเข้า','สถานะ','นาทีสาย','หัก(บ.)']];
    emp.details.forEach(d=>{const st=d.status==='ok'?'ปกติ':d.status==='late'?'สาย '+d.lateMin+' น.':d.status==='halfday'?'หักครึ่งวัน':'ไม่มีข้อมูล';
      rows.push([d.day+' ก.พ.',d.clockIn||'-',st,d.lateMin||'-',d.deduct||'-'])});
    rows.push([],['','','หักมาสาย',emp.totalLateMin+' นาที',emp.lateDeduct],['','','หักครึ่งวัน',emp.halfDayCount+' ครั้ง',emp.halfDayDeduct],['','','','รวมหัก',emp.totalDeduct]);
    const wb=X.utils.book_new(),ws=X.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:12},{wch:12},{wch:18},{wch:12},{wch:12}];
    X.utils.book_append_sheet(wb,ws,emp.name.substring(0,31));
    downloadXlsx(wb,'มาสาย_'+emp.code+'.xlsx');
  }catch(err){alert('Export ผิดพลาด: '+err.message)}};

  const Ico=({t})=>{
    if(t==='down')return<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>;
    if(t==='up')return<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>;
    if(t==='eye')return<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
    return<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>;
  };

  if(selectedEmp){
    const emp=summaries.find(e=>e.code===selectedEmp);if(!emp)return null;
    return(<div className="container">
      <button className="bb" onClick={()=>setSelectedEmp(null)}><Ico t="back"/> กลับ</button>
      <div className="dh">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'12px'}}>
          <div><h2 style={{fontSize:'24px',fontWeight:700}}>{emp.name}</h2><p style={{opacity:.8,fontSize:'13px',marginTop:'4px'}}>รหัส: {emp.code}</p></div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <span className={emp.type==='daily'?'badge badge-daily':'badge badge-perm'}>{emp.type==='daily'?'รายวัน ฿352':'ประจำ ฿400'}</span>
            <button className="btn" style={{background:'rgba(255,255,255,.2)',color:'#fff',fontSize:'12px'}} onClick={()=>toggle(emp.code)}>เปลี่ยน</button>
            <button className="btn" style={{background:'rgba(16,185,129,.8)',color:'#fff',fontSize:'12px',display:'flex',alignItems:'center',gap:'4px'}} onClick={()=>exportPerson(emp.code)}><Ico t="down"/> Export</button>
          </div>
        </div>
        <div className="ds">
          <div className="dsi"><div className="v">{emp.lateDays}</div><div className="l">วันสาย(หักนาที)</div></div>
          <div className="dsi"><div className="v">฿{fmt(emp.lateDeduct)}</div><div className="l">หักมาสาย</div></div>
          <div className="dsi"><div className="v">{emp.halfDayCount}</div><div className="l">ครั้งหักครึ่งวัน</div></div>
          <div className="dsi"><div className="v" style={{color:'#fde047'}}>฿{fmt(emp.totalDeduct)}</div><div className="l">รวมหัก</div></div>
        </div>
      </div>
      <div className="table-wrap"><div style={{overflowX:'auto'}}><table>
        <thead><tr><th>วันที่</th><th className="tc">เวลาเข้า</th><th className="tc">สถานะ</th><th className="tc">นาทีสาย</th><th className="tr">ยอดหัก</th></tr></thead>
        <tbody>{emp.details.map(d=><tr key={d.day} className={d.status==='halfday'?'rh':d.status==='late'?'rl':''}>
          <td style={{fontWeight:500}}>{d.day} ก.พ. 69</td><td className="tc fm">{d.clockIn||'-'}</td>
          <td className="tc">{d.status==='ok'&&<span className="badge badge-ok">ปกติ</span>}{d.status==='late'&&<span className="badge badge-late">สาย {d.lateMin} น.</span>}{d.status==='halfday'&&<span className="badge badge-halfday">หักครึ่งวัน</span>}{d.status==='none'&&<span className="badge badge-none">ไม่มีข้อมูล</span>}</td>
          <td className="tc">{d.lateMin>0?d.lateMin:'-'}</td><td className="tr fb">{d.deduct>0?<span className="c-red">฿{fmt(d.deduct)}</span>:'-'}</td>
        </tr>)}</tbody>
      </table></div></div>
    </div>);
  }

  return(<div className="container">
    <input type="file" accept=".xlsx,.xls" ref={fileRef} onChange={handleImport} className="hi"/>
    <div className="header">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'12px'}}>
        <div><h1>⏰ ระบบแจกแจงมาสาย — หักเงิน</h1><p>กุมภาพันธ์ 2569 | บริษัท เดอะ เอ็มที จำกัด</p></div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <button className="btn btn-import" onClick={()=>fileRef.current.click()} disabled={importing}><Ico t="up"/> {importing?'อ่าน...':'Import Excel'}</button>
          <button className="btn btn-export" onClick={exportAll}><Ico t="down"/> Export Excel</button>
        </div>
      </div>
      <div className="rules-box">
        <div className="rule-chip"><span style={{fontSize:'16px'}}>🕘</span> เข้างาน 09:00</div>
        <div className="rule-chip"><span style={{fontSize:'16px'}}>💸</span> สาย 09:01-09:30 หักนาทีละ ฿50</div>
        <div className="rule-chip"><span style={{fontSize:'16px'}}>⚠️</span> หลัง 09:30 หักครึ่งวัน</div>
        <div className="rule-chip"><span style={{fontSize:'16px'}}>📋</span> รายวัน ฿352 | ประจำ ฿400</div>
      </div>
    </div>
    <div className="stats-grid">
      <div className="stat-card"><div className="label">พนักงานทั้งหมด</div><div className="value" style={{color:'#1e3a5f'}}>{filtered.length}</div></div>
      <div className="stat-card"><div className="label" style={{color:'#d97706'}}>ครั้งมาสาย(หักนาที)</div><div className="value" style={{color:'#d97706'}}>{totals.lateCount}</div></div>
      <div className="stat-card"><div className="label" style={{color:'#dc2626'}}>ครั้งหักครึ่งวัน</div><div className="value" style={{color:'#dc2626'}}>{totals.halfDayCount}</div></div>
      <div className="stat-card danger"><div className="label">รวมยอดหักทั้งหมด</div><div className="value">฿{fmt(totals.totalDeduct)}</div></div>
    </div>
    <div className="controls">
      <input type="text" placeholder="🔍 ค้นหาชื่อ/รหัส..." value={search} onChange={e=>setSearch(e.target.value)} className="search-input"/>
      <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="select-box"><option value="all">ทุกประเภท</option><option value="permanent">ประจำ(400)</option><option value="daily">รายวัน(352)</option></select>
      <label className="checkbox-label"><input type="checkbox" checked={filterLate} onChange={e=>setFilterLate(e.target.checked)}/> เฉพาะคนโดนหัก</label>
      <div style={{marginLeft:'auto',display:'flex',gap:'6px'}}>
        <button className="btn btn-violet" onClick={()=>setAll('permanent')}>ทั้งหมด:ประจำ</button>
        <button className="btn btn-blue" onClick={()=>setAll('daily')}>ทั้งหมด:รายวัน</button>
      </div>
    </div>
    <div className="table-wrap"><div style={{overflowX:'auto'}}><table>
      <thead><tr><th>รหัส</th><th>ชื่อพนักงาน</th><th className="tc">ประเภท</th><th className="tc">วันสาย</th><th className="tc">รวมนาที</th><th className="tr">หักมาสาย</th><th className="tc">หักครึ่งวัน</th><th className="tr">หักครึ่งวัน(฿)</th><th className="tr">รวมหัก</th><th style={{textAlign:'center',width:'70px'}}></th></tr></thead>
      <tbody>{filtered.map(emp=><tr key={emp.code} className={emp.totalDeduct>0?'has-ded':''}>
        <td className="fm" style={{color:'#6b7280',fontSize:'12px'}}>{emp.code}</td>
        <td style={{fontWeight:500}}>{emp.name}</td>
        <td className="tc"><span className={emp.type==='daily'?'badge badge-daily':'badge badge-perm'} onClick={()=>toggle(emp.code)}>{emp.type==='daily'?'รายวัน':'ประจำ'}</span></td>
        <td className="tc">{emp.lateDays>0?<span className="c-amb fb">{emp.lateDays}</span>:<span className="c-gry">-</span>}</td>
        <td className="tc">{emp.totalLateMin>0?<span className="c-amb">{emp.totalLateMin}</span>:<span className="c-gry">-</span>}</td>
        <td className="tr">{emp.lateDeduct>0?<span className="c-red fb">฿{fmt(emp.lateDeduct)}</span>:<span className="c-gry">-</span>}</td>
        <td className="tc">{emp.halfDayCount>0?<span className="c-red fb">{emp.halfDayCount}</span>:<span className="c-gry">-</span>}</td>
        <td className="tr">{emp.halfDayDeduct>0?<span className="c-red fb">฿{fmt(emp.halfDayDeduct)}</span>:<span className="c-gry">-</span>}</td>
        <td className="tr">{emp.totalDeduct>0?<span className="c-red fb" style={{fontSize:'15px'}}>฿{fmt(emp.totalDeduct)}</span>:<span className="c-grn" style={{fontWeight:500}}>ไม่มี</span>}</td>
        <td className="tc" style={{whiteSpace:'nowrap'}}><button className="vb b" onClick={()=>setSelectedEmp(emp.code)} title="ดู"><Ico t="eye"/></button><button className="vb g" onClick={()=>exportPerson(emp.code)} title="Export"><Ico t="down"/></button></td>
      </tr>)}</tbody>
      <tfoot><tr><td colSpan="3" className="tr">รวมทั้งหมด</td><td className="tc c-amb">{totals.lateCount}</td><td className="tc">-</td><td className="tr c-red">฿{fmt(totals.lateDeduct)}</td><td className="tc c-red">{totals.halfDayCount}</td><td className="tr c-red">฿{fmt(totals.halfDayDeduct)}</td><td className="tr c-red" style={{fontSize:'17px'}}>฿{fmt(totals.totalDeduct)}</td><td></td></tr></tfoot>
    </table></div></div>
    <div className="footer">คลิก Badge สลับประเภท | 👁 ดูรายละเอียด | ⬇ Export รายบุคคล | ปุ่ม "Export Excel" ส่งออกทั้งหมด 3 ชีท</div>
  </div>);
}
ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
